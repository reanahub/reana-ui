server {
    listen       80;
    root   /usr/share/nginx/html;
    server_name  localhost;
    index  index.html index.htm;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), ambient-light-sensor=(), camera=(), display-capture=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(), payment=(), usb=()" always;
    # NOTE: keep in sync with reana-server config.py content security policy headers
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self'; frame-ancestors 'none'; object-src 'none'; base-uri 'self';" always;

    #Enable serving of pre-compressed files
    gzip_static on;

    location / {
        try_files $uri /index.html;
    }
    location = /index.html {
        # If the file for the requested URL does not exist, then `/index.html` is always
        # served. This might cause some issues given that `index.html` is cached by
        # the browser (e.g. in case of an URL to an interactive session).
        # This setting makes sure that `index.html` is revalidated on each request.
        expires -1;
    }
}
